//CLEAR BINDS

unbindall

//KEYBOARD

    //MOVEMENT

     bind w +forward
     bind s +back
     bind a +left
     bind d +right
     bind shift +sprint
     bind ctrl +duck
     bind space +jump


    //INTERACTION OR SELECT

     bind r +reload
     bind f +lookatweapon
     bind n drop
     bind e +use
     bind b buymenu
     bind t +spray_menu
     bind x switchhands
     bind 1 "slot1"
     bind 2 "slot2"
     bind mouse3 "slot9"
     bind 3 "slot3"
     bind 4 "slot6"
     bind 5 "slot10"
     bind alt "slot5"
     bind c "slot8"
     bind mouse5 "slot7"




    //COMMUNICATION

     bind v +voicerecord
     bind backspace messagemode2
     bind enter messagemode
     bind z +radialradio2
     bind q player_ping


    //MISC

     bind t +spray_menu
     bind tab +showscores
     bind m teammenu
     bind rshift noclip
     bind / toggleconsole
     bind f11 toggleconsole

//MOUSE

    //MOUSEMOVE

     bind "mouse_x" "yaw"
     bind "mouse_y" "pitch"

    //MOUSE SETTINGS

     bind mouse1 +attack
     bind mouse2 +attack2

     bind mwheelup +jump
     bind mwheeldown +jump


     zoom_sensitivity_ratio 0.87


//SOUNDS

     volume = 1
     snd_mvp_volume 0
     snd_roundstart_volume 0
     snd_roundend_volume 0
     snd_musicvolume 0
     snd_roundaction_volume 0
     snd_menumusic_volume 0
     sv_voiceenable 1


//HUD

     hud_showtargetid 1
     cl_allow_animated_avatars 0
     fps_max 0
     cl_hud_telemetry_ping_show 2
     cl_hud_telemetry_frametime_show 2
     hud_scaling 0.9
     cl_hud_color 5
     cl_showfps 0

//RADAR

    cl_hud_radar_scale 1.3
    cl_radar_rotate 0
    cl_radar_icon_scale_min 0.6
    bind g "toggle cl_radar_scale 0.4 1"
    cl_radar_square_with_scoreboard 1
    cl_radar_always_centered 1
    cl_radar_icon_scale_min 0.8
    cl_radar_scale 0.4


//ALIASES

    //EASY DISCONNECT
     alias dc  "disconnect"
     alias retards "disconnect"
     alias retard "disconnect"
     alias retarded "disconnect"
     alias hateteam "disconnect"

    //CLEAR CONSOLE
     alias x "clear"

    //EASY QUIT
     alias rage "quit"
     alias q "quit"
     alias shitaim "quit"
     alias suicide "quit"
     alias kms "quit"
     alias ihatemylife "quit"
     alias saveme "quit"
     alias savemepls "quit"


//MISC

    //OPTIONS FOR DUCKING AND CROUCHING
     option_duck_method 0
     option_speed_method 0

    //DISABLED
     bind y "Say ♿"
     bind u say "Watch Demo Watch Demo"

    //ETC
      r_drawtracers_firstperson 0
      bind f3 "toggle voice_modenable 0 1"

     //Bullets
      r_drawtracers_firstperson 0

     //Showing Color
      cl_teammate_colors_show "2"

     //Gamma Color Correction (For Yabosen At Least)
      r_fullscreen_gamma 1.500000

     //Sell All Weapons
      bind del "sellbackall"

     //radar
      bind h "toggleradarscale"

     //Hands Prefer
      alias "preferleft" "cl_prefer_lefthanded 1"
      alias "preferright" "cl_prefer_lefthanded 0"

     //Deathmatch
      alias "dm" "volume 0.1"
      alias "dm0" "volume 1"


     //Exec Yabosen.cfg Faster
      alias "Yabosencfg" "exec Yabosen.cfg"

     //Mic Activater And Offer
      alias "micon" "+voicerecord"
      alias "micoff" "-voicerecord"

     //Fps Counters
      alias "fps0" cl_showfps 0
      alias "fps1" cl_showfps 1
      alias "fps2" cl_showfps 4

host_writeconfig

